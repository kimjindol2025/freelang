# GitHub Actions: Release & Deploy to npm
# Tag 푸시 시 자동으로 npm에 배포

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: ✅ Run tests
        run: npm test

      - name: 📤 Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 변경사항
            
            [GitHub Release](https://github.com/freelang/freelang/releases/tag/${{ github.ref }})에서 확인하세요.
            
            ## 설치
            
            ```bash
            npm install freelang@${{ github.ref }}
            ```
            
            ## 문서
            
            - [README](https://github.com/freelang/freelang#readme)
            - [API Docs](https://github.com/freelang/freelang/tree/main/docs)
            - [Examples](https://github.com/freelang/freelang/tree/main/examples)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔔 Notify release
        run: |
          echo "✅ Released FreeLang ${{ github.ref }}"
          echo "📦 npm: https://www.npmjs.com/package/freelang"
          echo "🐙 GitHub: https://github.com/freelang/freelang/releases/tag/${{ github.ref }}"
